<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    
</head>
<body>


    <script>
      
        let comp1 = (5 == "5"); 
        console.log("5 == '5' é:", comp1); 

        
        let comp2 = (5 === "5"); 
        console.log("5 === '5' é:", comp2); 


        let comp3 = (5 != "5"); 
        console.log("5 != '5' é:", comp3);

      
        let comp4 = (5 !== "5"); 
        console.log("5 !== '5' é:", comp4); 

        
    </script>
</body>
</html>
