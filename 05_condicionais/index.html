<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

</head>
<body>

 

    <script>
      
        console.log("--- Teste de Idade ---");
        let idade = 20;

        if (idade >= 18) { 
            console.log("Maior de idade"); 
        } else {
            console.log("Menor de idade"); 
        }


   
        console.log("\n--- Teste de Notas ---");
        let nota = 6.5;

        if (nota >= 7) {
            console.log("Aprovado");
        } else if (nota >= 5) {
            console.log("Recuperação");
        } else {
            console.log("Reprovado");
        }


       
        console.log("\n--- Teste de Switch ---");
        let diaDaSemana = 3; 

        switch (diaDaSemana) {
            case 1:
                console.log("Domingo");
                break;
            case 2:
                console.log("Segunda-feira");
                break;
            case 3:
                console.log("Terça-feira");
                break;
            default:
                console.log("Dia não cadastrado");
        }



    </script>

</body>
</html>
